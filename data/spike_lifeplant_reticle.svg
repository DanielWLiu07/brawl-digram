  <!-- Max range ring (where the cactus CAN be placed) -->
  <circle cx="300.0" cy="500" r="220.0" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Trajectory arc (indicates indirect/thrown projectile) -->
