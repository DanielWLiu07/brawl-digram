  <circle cx="300.0" cy="280.0" r="4" fill="#4ade80"/>
  <line x1="280.0" y1="280.0" x2="320.0" y2="280.0" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="300.0" y1="260.0" x2="300.0" y2="300.0" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Heal-burst-on-death radius (larger faded pulse) -->
  <circle cx="300.0" cy="280.0" r="62.50000000000001" fill="#f87171" fill-opacity="0.12" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="370.5" y="229.5" font-family="monospace" font-size="11" fill="#f87171">heal burst on death</text>
  <text x="370.5" y="243.5" font-family="monospace" font-size="10" fill="#888">radius 2.08 tiles, allies only</text>

  <!-- Cactus footprint (small, what physically spawns) -->
