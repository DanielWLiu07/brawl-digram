  <text x="325.0" y="334.5" font-family="monospace" font-size="11" fill="#4ade80">cactus body</text>
  <text x="325.0" y="348.5" font-family="monospace" font-size="10" fill="#888">blocks shots, 1750 HP</text>

  <!-- Spike token -->
  <circle cx="300.0" cy="500" r="12" fill="#fff" stroke="#4ade80" stroke-width="3"/>
  <text x="300.0" y="504" font-family="monospace" font-size="11" fill="#000" text-anchor="middle" font-weight="bold">Sp</text>

  <!-- Title + labels -->
  <text x="20" y="30" font-family="monospace" font-size="18" fill="#fff" font-weight="bold">Spike — Life Plant gadget reticle</text>
  <text x="20" y="52" font-family="monospace" font-size="12" fill="#aab">card: Cactus_Cover   skill: CactusBonusSkillCover</text>
  <text x="20" y="70" font-family="monospace" font-size="12" fill="#aab">range: 22u  =  7.33 tiles (placement)</text>
  <text x="20" y="88" font-family="monospace" font-size="12" fill="#aab">projectile: Indirect (thrown, gravity 240) — arc, not direct-fire</text>
  <text x="20" y="106" font-family="monospace" font-size="12" fill="#aab">spawns: CactusCover (1750 HP, ~0.50 tile collision)</text>
  <text x="20" y="124" font-family="monospace" font-size="12" fill="#aab">cooldown: 20s     charges: 1     heal: on death</text>
  <text x="20" y="142" font-family="monospace" font-size="12" fill="#f87171">heal-burst: 2.08 tile radius, -30 dmg = heal (scales w/ HP)</text>

  <text x="20" y="580" font-family="monospace" font-size="10" fill="#666">1 tile = 30px  |  reticle type = "indirect placement" (same family as throwers)</text>
